name: AWS certifications page

# History of Premier partners
# https://partners.amazonaws.com/partners/001E000000Ufa9FIAR/Thoughtworks

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "Deploy Datasette and keep a history of changes of the partner db"
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false
      - name: Set up git-lfs
        run: git lfs install
      - uses: astral-sh/setup-uv@v7
      - name: Fetch existing CSV from GitHub Pages
        run: |
          curl -sf "https://kaihendry.github.io/aws-partners-datasette/premier.csv" -o premier.csv || true
          if [ -f premier.csv ] && [ -s premier.csv ]; then
            LAST_DATE=$(tail -n +2 premier.csv | cut -d',' -f1 | sort | tail -1)
            echo "Last processed date: $LAST_DATE"
            echo "LAST_DATE=$LAST_DATE" >> $GITHUB_ENV
          else
            echo "No existing CSV, processing full history"
            echo "LAST_DATE=0000-00-00" >> $GITHUB_ENV
          fi
      - name: Compute history (incremental)
        run: |-
          touch new_rows.csv
          # Only process commits newer than the last processed date
          git log --pretty=format:"%ad %H %s" --date=short | \
            awk '/Latest data:/ {print $1, $2}' | \
            while read -r date hash
          do
            if [[ "$date" <= "$LAST_DATE" ]]; then
              echo "Skipping $date (already processed)"
              continue
            fi
            echo "Processing: $date $hash"
            git checkout $hash -- partners/ || break
            git lfs pull --include="partners/partners.ndjson,partners/summary.ndjson" || { echo "LFS pull failed for $hash, skipping"; continue; }
            rm -f partners.db
            uv run sqlite-diffable load partners.db partners || { echo "Load failed for $hash, skipping"; continue; }
            sqlite3 -csv partners.db "select '${date}' AS 'date', literal_name, aws_certifications_count, customer_launches_count from partners where current_program_status = 'Premier' and customer_type = 'Consulting Partner';" >> new_rows.csv
          done
          # Merge: existing CSV (without header) + new rows, sort, re-add header
          if [ -f premier.csv ] && [ -s premier.csv ]; then
            tail -n +2 premier.csv > existing_rows.csv
          else
            touch existing_rows.csv
          fi
          cat existing_rows.csv new_rows.csv | sort > merged.csv
          echo 'date,company,certifications,launches' | cat - merged.csv > premier.csv
          wc -l premier.csv
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - run: mkdir "_site" && mv plot/* premier.csv _site/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
